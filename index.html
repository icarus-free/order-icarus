<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聚会点菜（Firebase 实时）</title>
  <style>
    :root {
      --bg: #f5f2ec;
      --panel: #fffaf2;
      --ink: #1f1a16;
      --muted: #7b6f62;
      --gold: #9b7d4b;
      --line: #e7dccd;
      --dark: #241d16;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Noto Serif SC", "Source Han Serif SC", serif; background: radial-gradient(circle at 10% 10%, #fffaf4 0%, var(--bg) 60%); color: var(--ink); }
    .wrap { max-width: 900px; margin: 0 auto; padding: 16px 16px 100px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 14px; margin-bottom: 14px; box-shadow: 0 8px 24px rgba(64, 40, 18, 0.07); }
    h1 { margin: 4px 0 10px; font-size: 24px; }
    h2 { margin: 4px 0 10px; font-size: 18px; color: var(--gold); }
    h3 { margin: 8px 0; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, textarea, select, button { border: 1px solid var(--line); border-radius: 10px; padding: 10px; font: inherit; background: #fff; }
    input, textarea, select { width: 100%; }
    button { background: var(--ink); color: #fff; cursor: pointer; }
    button.alt { background: #fff; color: var(--ink); }
    button.warn { background: #8a2f2f; }
    .pill { padding: 4px 8px; border: 1px solid var(--line); border-radius: 999px; color: var(--muted); font-size: 12px; }
    .dish { border: 1px solid var(--line); border-radius: 12px; padding: 10px; margin-bottom: 10px; background: #fffefb; }
    .dish img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin: 8px 0; }
    .muted { color: var(--muted); font-size: 13px; }
    .hide { display: none; }

    .category-rail {
      position: fixed;
      left: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 68px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 20;
      touch-action: none;
    }
    .category-btn {
      background: rgba(255, 250, 242, 0.95);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 12px;
      padding: 8px 4px;
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      background: rgba(36, 29, 22, 0.96);
      padding: 10px 12px env(safe-area-inset-bottom);
      display: flex;
      gap: 10px;
    }
    .bottom-bar button {
      flex: 1;
      background: #f3e5ce;
      color: #2c2218;
      border: 0;
      font-weight: 700;
    }

    .picked-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 64px;
      max-height: 45vh;
      overflow: auto;
      background: var(--panel);
      border-top: 1px solid var(--line);
      padding: 12px;
      z-index: 24;
    }

    .admin-dish-actions { display: flex; gap: 8px; }
    .admin-dish-actions button { flex: 1; }
    .admin-collapse { margin-top: 16px; }
    .admin-collapse summary { cursor: pointer; color: var(--gold); font-weight: 700; }
    .modal-mask {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center; z-index: 40;
    }
    .modal-mask.hide { display: none; }
    .modal {
      width: min(92vw, 520px); background: var(--panel); border: 1px solid var(--line);
      border-radius: 14px; padding: 14px;
    }

    @media (min-width: 900px) {
      .category-rail { left: calc(50% - 530px); }
    }
  </style>
</head>
<body>
  <div class="category-rail" id="categoryRail"></div>

  <div class="wrap">
    <div class="card">
      <h1>朋友聚会点菜</h1>
      <div class="row">
        <span class="pill" id="roleTag">成员模式</span>
        <span class="pill" id="syncTag">未连接云端</span>
        <button class="alt" id="adminEntryBtn">管理员入口</button>
        <button class="alt" id="shareBtn">复制成员链接</button>
        <button class="alt" id="shareAdminBtn">复制管理员链接</button>
        <button class="alt" id="pdfBtn">导出汇总 PDF</button>
      </div>
    </div>

    <div class="card hide" id="cloudPanel">
      <h2>云端配置（管理员）</h2>
      <div class="row"><input id="fbApiKey" placeholder="Firebase apiKey" /></div>
      <div class="row"><input id="fbAuthDomain" placeholder="Firebase authDomain" /></div>
      <div class="row"><input id="fbProjectId" placeholder="Firebase projectId" /></div>
      <div class="row"><input id="fbAppId" placeholder="Firebase appId" /></div>
      <div class="row"><input id="adminSecretInput" placeholder="管理员口令（自定义）" /></div>
      <div class="row"><button class="alt" id="saveAdminSecretBtn">保存管理员口令</button></div>
      <div class="row"><label><input type="checkbox" id="allowSubmitToggle" checked /> 允许成员提交点菜</label></div>
      <div class="row"><button id="connectBtn">连接实时同步</button></div>
      <div id="connectStatus" class="muted">管理员填 Firebase 参数并连接。</div>
    </div>

    <div class="card" id="memberCard">
      <h2>参与人</h2>
      <div class="row">
        <input id="memberName" placeholder="输入你的姓名（必填）" />
        <button id="saveMember">进入点菜</button>
      </div>
      <div class="muted" id="memberStatus">姓名必填，进入后即可点菜。</div>
    </div>

    <div class="card" id="searchCard">
      <h2>搜索菜品</h2>
      <input id="search" placeholder="输入菜名模糊搜索" />
    </div>

    <div class="card hide" id="adminPanel">
      <h2>管理员：新增菜品</h2>
      <div class="row"><input id="dishName" placeholder="菜名" /></div>
      <div class="row"><select id="dishCat"><option>肉类</option><option>海鲜</option><option>蔬菜</option><option>主食</option><option>点心</option></select></div>
      <div class="row"><textarea id="dishNote" rows="2" placeholder="菜品备注（可选）"></textarea></div>
      <div class="row"><input id="dishImg" type="file" accept="image/*" /></div>
      <button id="addDish">添加菜品</button>

      <details class="admin-collapse">
        <summary>管理员：管理菜品（点击展开）</summary>
        <div class="row" style="margin-top:10px;">
          <button class="warn" id="resetOrdersBtn">重置全部点菜清单</button>
        </div>
        <div id="adminDishList" style="margin-top:10px;"></div>
      </details>
    </div>

    <div class="card" id="dishCard">
      <h2>菜品列表</h2>
      <div id="dishList"></div>
    </div>

    <div class="card">
      <h2>管理员统计视图</h2>
      <div id="summary" class="muted">仅管理员可看明细与统计。</div>
    </div>
  </div>

  <div class="bottom-bar" id="bottomBar">
    <button id="pickedBtn">已点菜品</button>
    <button id="submitOrderBtn">提交点菜</button>
  </div>
  <div class="picked-panel hide" id="pickedPanel"></div>
  <div class="modal-mask hide" id="editModalMask">
    <div class="modal">
      <h2>编辑菜品</h2>
      <div class="row"><input id="editDishName" placeholder="菜名" /></div>
      <div class="row"><select id="editDishCat"><option>肉类</option><option>海鲜</option><option>蔬菜</option><option>主食</option><option>点心</option></select></div>
      <div class="row"><textarea id="editDishNote" rows="2" placeholder="菜品备注（可选）"></textarea></div>
      <div class="row"><img id="editDishPreview" alt="预览" style="width:100%;height:140px;object-fit:cover;border-radius:10px;border:1px solid var(--line);" /></div>
      <div class="row"><input id="editDishImg" type="file" accept="image/*" /></div>
      <div class="row">
        <button class="alt" id="cancelEditBtn">取消</button>
        <button id="saveEditBtn">完成并退出</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    const categories = ["肉类", "海鲜", "蔬菜", "主食", "点心"];
    const params = new URLSearchParams(location.search);
    const DEFAULT_ADMIN_SECRET = "icarus.cooker";
    const adminModeRequested = params.get("admin") === "1";
    const adminKeyFromUrl = params.get("key") || "";
    let isAdmin = false;

    function makeId() { return `id-${Date.now()}-${Math.floor(Math.random() * 1e9)}`; }
    function buildDishImage(name) {
      const safe = String(name || "").replace(/[<>&'\"]/g, "");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8efe1"/><stop offset="100%" stop-color="#e8d7bf"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#g)"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="72" fill="#7c623d" font-family="serif">${safe}</text></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    const seed = [
      { id: makeId(), name: "可乐鸡翅", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "清炒空心菜", cat: "蔬菜", note: "", img: "" },
      { id: makeId(), name: "小炒黄牛肉", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "椒盐虾", cat: "海鲜", note: "", img: "" },
      { id: makeId(), name: "椒麻口水鸡", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "糖醋排骨", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "回锅肉", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "番茄炒蛋", cat: "蔬菜", note: "", img: "" },
      { id: makeId(), name: "炖排骨", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "香干炒肉", cat: "肉类", note: "", img: "" },
      { id: makeId(), name: "秘制火鸡面", cat: "主食", note: "", img: "" }
    ];

    const roleTag = document.getElementById("roleTag");
    const syncTag = document.getElementById("syncTag");
    const cloudPanel = document.getElementById("cloudPanel");
    const adminPanel = document.getElementById("adminPanel");
    const memberCard = document.getElementById("memberCard");
    const searchCard = document.getElementById("searchCard");
    const dishCard = document.getElementById("dishCard");
    const memberInput = document.getElementById("memberName");
    const memberStatus = document.getElementById("memberStatus");
    const connectStatus = document.getElementById("connectStatus");
    const bottomBar = document.getElementById("bottomBar");
    const pickedPanel = document.getElementById("pickedPanel");
    const categoryRail = document.getElementById("categoryRail");

    function applyRoleUI() {
      if (isAdmin) {
        roleTag.textContent = "管理员模式";
        adminPanel.classList.remove("hide");
        cloudPanel.classList.remove("hide");
        document.getElementById("shareAdminBtn").classList.remove("hide");
        memberCard.classList.add("hide");
        searchCard.classList.add("hide");
        dishCard.classList.add("hide");
        bottomBar.classList.add("hide");
        categoryRail.classList.add("hide");
      } else {
        roleTag.textContent = "成员模式";
        adminPanel.classList.add("hide");
        cloudPanel.classList.add("hide");
        document.getElementById("shareAdminBtn").classList.add("hide");
        memberCard.classList.remove("hide");
        searchCard.classList.remove("hide");
        dishCard.classList.remove("hide");
        bottomBar.classList.remove("hide");
        categoryRail.classList.remove("hide");
      }
    }

    function getStore(key, fallback = "") {
      try { return localStorage.getItem(key) || fallback; } catch { return fallback; }
    }
    function setStore(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }

    let member = getStore("member-name") || "";
    memberInput.value = member;
    memberStatus.textContent = member ? `当前昵称：${member}` : "未设置昵称（可直接点菜）";

    let roomRef = null;
    let roomState = { dishes: seed, orders: {}, settings: { allowSubmit: true, adminSecret: DEFAULT_ADMIN_SECRET } };

    function safeState(raw) {
      if (!raw || typeof raw !== "object") return { dishes: seed, orders: {}, settings: { allowSubmit: true, adminSecret: DEFAULT_ADMIN_SECRET } };
      return {
        dishes: Array.isArray(raw.dishes) ? raw.dishes : seed,
        orders: raw.orders && typeof raw.orders === "object" ? raw.orders : {},
        settings: raw.settings && typeof raw.settings === "object"
          ? {
              allowSubmit: raw.settings.allowSubmit !== false,
              adminSecret: raw.settings.adminSecret || DEFAULT_ADMIN_SECRET
            }
          : { allowSubmit: true, adminSecret: DEFAULT_ADMIN_SECRET }
      };
    }

    function getCloudAdminSecret() {
      return (roomState.settings && roomState.settings.adminSecret) || DEFAULT_ADMIN_SECRET;
    }

    function syncAdminAccess() {
      isAdmin = adminModeRequested && adminKeyFromUrl === getCloudAdminSecret();
      applyRoleUI();
    }

    const defaultCfg = {
      apiKey: "AIzaSyAgd4dHKM0Kh3B7RyzBmP77swBOXNnQdGo",
      authDomain: "order-459ca.firebaseapp.com",
      projectId: "order-459ca",
      appId: "1:36543886310:web:f8cbc1038e4c774ee79c27"
    };
    const cfg = {
      apiKey: params.get("apiKey") || getStore("fb-apiKey") || defaultCfg.apiKey,
      authDomain: params.get("authDomain") || getStore("fb-authDomain") || defaultCfg.authDomain,
      projectId: params.get("projectId") || getStore("fb-projectId") || defaultCfg.projectId,
      appId: params.get("appId") || getStore("fb-appId") || defaultCfg.appId
    };

    document.getElementById("fbApiKey").value = cfg.apiKey;
    document.getElementById("fbAuthDomain").value = cfg.authDomain;
    document.getElementById("fbProjectId").value = cfg.projectId;
    document.getElementById("fbAppId").value = cfg.appId;

    function ensureMember(showAlert = true) {
      if (!member) {
        if (showAlert) {
          memberInput.focus();
          alert("请先填写姓名再进行点菜");
        }
        return false;
      }
      if (!roomState.orders[member]) roomState.orders[member] = { picks: {}, notes: {}, submittedAt: null };
      return true;
    }

    async function connectFirebase() {
      if (roomRef) {
        connectStatus.textContent = "已连接 Firebase 实时同步";
        return;
      }
      const apiKey = document.getElementById("fbApiKey").value.trim();
      const authDomain = document.getElementById("fbAuthDomain").value.trim();
      const projectId = document.getElementById("fbProjectId").value.trim();
      const appId = document.getElementById("fbAppId").value.trim();
      if (!apiKey || !authDomain || !projectId || !appId) return alert("请填写完整 Firebase 参数");

      setStore("fb-apiKey", apiKey);
      setStore("fb-authDomain", authDomain);
      setStore("fb-projectId", projectId);
      setStore("fb-appId", appId);

      connectStatus.textContent = "连接中...";
      const app = initializeApp({ apiKey, authDomain, projectId, appId }, `app-${projectId}`);
      const db = getFirestore(app);
      roomRef = doc(db, "menu_rooms", "main");

      const snap = await getDoc(roomRef);
      if (!snap.exists()) {
        await setDoc(roomRef, { state: roomState, updatedAt: serverTimestamp() });
      } else {
        roomState = safeState(snap.data().state);
      }
      syncAdminAccess();

      onSnapshot(roomRef, (s) => {
        if (!s.exists()) return;
        roomState = safeState(s.data().state);
        syncAdminAccess();
        render();
      });

      syncTag.textContent = "实时中";
      connectStatus.textContent = "已连接 Firebase 实时同步";
      document.getElementById("allowSubmitToggle").checked = roomState.settings.allowSubmit !== false;
      document.getElementById("adminSecretInput").value = getCloudAdminSecret();
      render();
    }

    async function pushState() {
      if (!roomRef) return false;
      try {
        await setDoc(roomRef, { state: roomState, updatedAt: serverTimestamp() }, { merge: true });
        return true;
      } catch (e) {
        console.error(e);
        return false;
      }
    }

    function wireCategoryRail() {
      categoryRail.innerHTML = "";
      categories.forEach((cat) => {
        const btn = document.createElement("button");
        btn.className = "category-btn";
        btn.textContent = cat;
        btn.onclick = () => {
          const sec = document.getElementById(`section-${cat}`);
          if (sec) sec.scrollIntoView({ behavior: "smooth", block: "start" });
        };
        categoryRail.appendChild(btn);
      });
      categoryRail.onpointermove = (e) => {
        if (!(e.buttons & 1)) return;
        const element = document.elementFromPoint(e.clientX, e.clientY);
        if (element && element.classList.contains("category-btn")) element.click();
      };
    }

    function renderPickedPanel() {
      if (!ensureMember(false)) {
        pickedPanel.innerHTML = "<div class='muted'>请先填写姓名。</div>";
        return;
      }
      const my = roomState.orders[member] || { picks: {}, notes: {} };
      const selected = Object.entries(my.picks || {}).filter(([, v]) => v).map(([id]) => {
        const d = roomState.dishes.find((x) => x.id === id);
        return d ? { name: d.name, note: my.notes[id] || "" } : null;
      }).filter(Boolean);
      if (!selected.length) {
        pickedPanel.innerHTML = "<div class='muted'>你还没点菜。</div>";
        return;
      }
      pickedPanel.innerHTML = selected.map((x) => `<div style='margin-bottom:8px;'><strong>${x.name}</strong>${x.note ? `：${x.note}` : ""}</div>`).join("");
    }

    async function togglePick(dishId, checked) {
      if (!ensureMember()) return;
      roomState.orders[member].picks[dishId] = checked;
      await pushState();
      renderPickedPanel();
    }

    async function saveTempNote(dishId, value) {
      if (!ensureMember()) return;
      roomState.orders[member].notes[dishId] = value;
      await pushState();
      renderPickedPanel();
    }

    function renderAdminDishList() {
      const box = document.getElementById("adminDishList");
      if (!isAdmin) return;
      box.innerHTML = "";
      roomState.dishes.forEach((d) => {
        const el = document.createElement("div");
        el.className = "dish";
        const imgSrc = d.img || buildDishImage(d.name);
        el.innerHTML = `
          <strong>${d.name}</strong>
          <div class="muted">${d.cat}${d.note ? ` | ${d.note}` : ""}</div>
          <img src="${imgSrc}" alt="${d.name}">
          <div class="admin-dish-actions">
            <button class="alt" data-edit="${d.id}">编辑</button>
            <button class="warn" data-del="${d.id}">删除</button>
          </div>
        `;
        el.querySelector("[data-edit]").onclick = async () => {
          openEditModal(d.id);
        };
        el.querySelector("[data-del]").onclick = async () => {
          if (!confirm(`确认删除 ${d.name} ?`)) return;
          roomState.dishes = roomState.dishes.filter((x) => x.id !== d.id);
          Object.values(roomState.orders).forEach((o) => {
            if (o.picks) delete o.picks[d.id];
            if (o.notes) delete o.notes[d.id];
          });
          await pushState();
          render();
        };
        box.appendChild(el);
      });
    }

    let editDishId = "";
    let editDishImgData = "";
    function openEditModal(dishId) {
      const d = roomState.dishes.find((x) => x.id === dishId);
      if (!d) return;
      editDishId = dishId;
      editDishImgData = d.img || "";
      document.getElementById("editDishName").value = d.name;
      document.getElementById("editDishCat").value = d.cat;
      document.getElementById("editDishNote").value = d.note || "";
      document.getElementById("editDishPreview").src = d.img || buildDishImage(d.name);
      document.getElementById("editDishImg").value = "";
      document.getElementById("editModalMask").classList.remove("hide");
    }

    function render() {
      const box = document.getElementById("dishList");
      const kw = document.getElementById("search").value.trim();
      const dishes = roomState.dishes || [];
      const mine = (roomState.orders[member] && roomState.orders[member].picks) || {};
      const myNotes = (roomState.orders[member] && roomState.orders[member].notes) || {};
      box.innerHTML = "";

      categories.forEach((cat) => {
        const list = dishes.filter((d) => d.cat === cat && d.name.includes(kw));
        if (!list.length) return;
        const sec = document.createElement("div");
        sec.id = `section-${cat}`;
        sec.innerHTML = `<h3>${cat}</h3>`;
        list.forEach((d) => {
          const el = document.createElement("div");
          const imgSrc = d.img || buildDishImage(d.name);
          el.className = "dish";
          el.innerHTML = `<div class="row"><strong>${d.name}</strong></div><img src="${imgSrc}" alt="${d.name}">${d.note ? `<div class="muted">${d.note}</div>` : ""}<div class="row"><label><input type="checkbox" ${mine[d.id] ? "checked" : ""}/> 我想点这个</label></div><div class="row"><input placeholder="本次备注（可选）" value="${myNotes[d.id] || ""}" /></div>`;
          el.querySelector("input[type=checkbox]").onchange = (e) => togglePick(d.id, e.target.checked);
          el.querySelector("input[placeholder]").onchange = (e) => saveTempNote(d.id, e.target.value.trim());
          sec.appendChild(el);
        });
        box.appendChild(sec);
      });
      renderSummary();
      renderAdminDishList();
      renderPickedPanel();
    }

    function renderSummary() {
      const box = document.getElementById("summary");
      if (!isAdmin) { box.textContent = "仅管理员可看明细与统计。"; return; }
      const dishes = roomState.dishes || [];
      const count = {};
      const noteMap = {};
      let html = "<div>";
      Object.entries(roomState.orders || {}).forEach(([name, data]) => {
        const picks = Object.entries(data.picks || {}).filter(([, v]) => v);
        const items = picks.map(([id]) => {
          const dish = dishes.find((d) => d.id === id);
          if (!dish) return null;
          const tempNote = (data.notes && data.notes[id]) || "";
          if (tempNote) {
            if (!noteMap[id]) noteMap[id] = [];
            noteMap[id].push(`${name}:${tempNote}`);
          }
          return `${dish.name}${tempNote ? `（${tempNote}）` : ""}`;
        }).filter(Boolean);
        const status = data.submittedAt ? "<span class='pill'>已提交</span>" : "<span class='pill'>未提交</span>";
        html += `<div><strong>${name}</strong> ${status}：${items.join("、") || "未点"}</div>`;
        picks.forEach(([id]) => { count[id] = (count[id] || 0) + 1; });
      });
      html += "<hr><strong>总计：</strong><br/>";
      Object.entries(count).forEach(([id, n]) => {
        const d = dishes.find((x) => x.id === id);
        if (d) html += `${d.name} x ${n}${noteMap[id] && noteMap[id].length ? `<br/><span class='muted'>备注：${noteMap[id].join("；")}</span>` : ""}<br/>`;
      });
      html += "</div>";
      box.innerHTML = html;
    }

    function buildSummaryHtml() {
      function shortenNote(text) {
        const raw = String(text || "").trim();
        if (!raw) return "";
        if (/\s/.test(raw)) {
          const words = raw.split(/\s+/);
          return words.length > 20 ? `${words.slice(0, 20).join(" ")} 略` : raw;
        }
        return raw.length > 20 ? `${raw.slice(0, 20)}略` : raw;
      }
      const dishes = roomState.dishes || [];
      const count = {};
      const noteMap = {};
      Object.entries(roomState.orders || {}).forEach(([name, data]) => {
        Object.entries(data.picks || {}).forEach(([id, v]) => {
          if (!v) return;
          count[id] = (count[id] || 0) + 1;
          const t = (data.notes && data.notes[id]) || "";
          if (t) {
            if (!noteMap[id]) noteMap[id] = [];
            noteMap[id].push(`${name}:${shortenNote(t)}`);
          }
        });
      });
      let rows = "";
      Object.entries(count).forEach(([id, n]) => {
        const d = dishes.find((x) => x.id === id);
        if (!d) return;
        rows += `<tr><td>${d.name}</td><td>${d.cat}</td><td>${n}</td><td>${shortenNote(d.note || "")}</td><td>${(noteMap[id] || []).join("；")}</td></tr>`;
      });
      return `<!doctype html><html><head><meta charset="UTF-8"><title>点菜单汇总</title><style>body{font-family:serif;background:#f7f2e8;color:#2b2118;padding:24px}h1{color:#8b6a3e;margin-bottom:12px}table{width:100%;border-collapse:collapse;background:#fffdf8}th,td{border:1px solid #dcc8ab;padding:10px;text-align:left}th{background:#f0e1ca}tr:nth-child(even){background:#fcf7ef}</style></head><body><h1>聚会点菜单汇总</h1><table><tr><th>菜名</th><th>分类</th><th>数量</th><th>菜品备注</th><th>用户备注</th></tr>${rows}</table></body></html>`;
    }

    function fileToDataURL(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    document.getElementById("connectBtn").onclick = connectFirebase;

      if (!member) {
        memberInput.focus();
        alert("姓名为必填项");

        return;
      }
      roomState.orders[member].submittedAt = new Date().toISOString();
      const btn = document.getElementById("submitOrderBtn");
      const oldText = btn.textContent;
      btn.textContent = "提交中...";
      const ok = await pushState();
      btn.textContent = oldText;
      if (ok) {

    document.getElementById("pickedBtn").onclick = () => {

    document.getElementById("search").addEventListener("input", render);
    document.getElementById("dishImg").addEventListener("change", async (e) => {

    document.getElementById("addDish").onclick = async () => {

    document.getElementById("shareBtn").onclick = async () => {

      const q = new URLSearchParams({ admin: "1", key: secret, apiKey: cfg.apiKey, authDomain: cfg.authDomain, projectId: cfg.projectId, appId: cfg.appId });
      location.href = `${base}?${q.toString()}`;
    };
    document.getElementById("shareAdminBtn").onclick = async () => {
      const base = `${location.origin}${location.pathname}`;
      const q = new URLSearchParams({ admin: "1", key: getCloudAdminSecret(), apiKey: cfg.apiKey, authDomain: cfg.authDomain, projectId: cfg.projectId, appId: cfg.appId });
      await navigator.clipboard.writeText(`${base}?${q.toString()}`);
      alert("管理员链接已复制");
    };
    document.getElementById("pdfBtn").onclick = () => {
      if (!isAdmin) return alert("仅管理员可导出");
      const win = window.open("", "_blank");
      win.document.write(buildSummaryHtml());
      win.document.close();

      win.print();
    };
    document.getElementById("resetOrdersBtn").onclick = async () => {
      if (!confirm("确认重置全部用户点菜清单吗？此操作不可撤销。")) return;
      roomState.orders = {};

      render();
      alert("已重置点菜清单");
    };
    document.getElementById("cancelEditBtn").onclick = () => {
      document.getElementById("editModalMask").classList.add("hide");
    };
    document.getElementById("editDishImg").addEventListener("change", async (e) => {
      const f = e.target.files[0];
      if (!f) return;
      editDishImgData = await compressImageToDataURL(f, 1280, 0.82);
      document.getElementById("editDishPreview").src = editDishImgData;
    });
    document.getElementById("saveEditBtn").onclick = async () => {
      const d = roomState.dishes.find((x) => x.id === editDishId);
      if (!d) return;
      const name = document.getElementById("editDishName").value.trim();
      const cat = document.getElementById("editDishCat").value;
      const note = document.getElementById("editDishNote").value.trim();
      if (!name) return alert("菜名不能为空");
      d.name = name;

    document.getElementById("allowSubmitToggle").onchange = async (e) => {

      if (!ok) alert("保存提交开关失败，请重试");

    wireCategoryRail();
    applyRoleUI();
    document.getElementById("adminSecretInput").value = getCloudAdminSecret();
    if (cfg.apiKey && cfg.authDomain && cfg.projectId && cfg.appId) {
      connectFirebase();
    } else {
      syncTag.textContent = "本地模式";
      render();
    }

    async function compressImageToDataURL(file, maxSide = 1280, quality = 0.82) {
      const raw = await fileToDataURL(file);
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const ratio = Math.min(1, maxSide / Math.max(img.width, img.height));
          const w = Math.max(1, Math.round(img.width * ratio));
          const h = Math.max(1, Math.round(img.height * ratio));
          const c = document.createElement("canvas");
          c.width = w; c.height = h;
          const ctx = c.getContext("2d");
          ctx.drawImage(img, 0, 0, w, h);
          resolve(c.toDataURL("image/jpeg", quality));
        };
        img.onerror = () => resolve(raw);
        img.src = raw;
      });
    }
  </script>
