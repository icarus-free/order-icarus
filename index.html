<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>聚会点菜（Firebase 实时）</title>
  <style>
    :root {
      --bg: #f7f4f0;
      --surface: #ffffff;
      --surface-2: #f3eee8;
      --ink: #2a2523;
      --muted: #7b706b;
      --accent: #6f4437;
      --accent-2: #b77762;
      --line: #e5d9d0;
      --danger: #a84035;
      --rose: #c98b85;
      --night: #211817;
      --shadow: 0 10px 28px rgba(66, 43, 35, 0.09);
      --gift-velvet: #160d0f;
      --gift-velvet-2: #3f2524;
      --gift-rose: #bc786d;
      --gift-rose-dark: #6f3631;
      --gift-gold: #ffd98f;
      --gift-cream: #fff1e6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #f0e3dc 0%, var(--bg) 260px);
      color: var(--ink);
    }
    body.birthday-gift-active { overflow: hidden; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 18px 14px 104px; }
    .card {
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .wrap > .card:first-of-type {
      position: sticky;
      top: 0;
      z-index: 18;
      border-radius: 0 0 8px 8px;
      border-top: 0;
      backdrop-filter: blur(14px);
    }
    h1 { margin: 0 0 10px; font-size: clamp(22px, 4vw, 32px); line-height: 1.15; font-weight: 800; letter-spacing: 0; }
    h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); font-weight: 800; }
    h3 {
      margin: 18px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
      color: #354039;
      font-size: 15px;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    input, textarea, select, button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 11px 12px;
      font: inherit;
      background: #fff;
    }
    input, textarea, select { width: 100%; color: var(--ink); }
    input:focus, textarea:focus, select:focus {
      outline: 2px solid rgba(111, 68, 55, 0.2);
      border-color: var(--accent);
    }
    button {
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      border-color: var(--accent);
      font-weight: 750;
      min-height: 42px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button.alt { background: #fff; color: var(--accent); border-color: #d8beb4; }
    button.warn { background: var(--danger); border-color: var(--danger); }
    label { color: var(--muted); }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 4px 9px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .dish {
      display: grid;
      grid-template-columns: 132px minmax(0, 1fr);
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      background: var(--surface);
    }
    .dish img {
      grid-row: span 4;
      width: 132px;
      height: 108px;
      object-fit: cover;
      border-radius: 8px;
      margin: 0;
      background: var(--surface-2);
    }
    .dish .row { align-items: flex-start; }
    .dish strong { font-size: 17px; line-height: 1.25; }
    .dish input[type="checkbox"] { width: auto; }
    .muted { color: var(--muted); font-size: 13px; line-height: 1.5; }
    .hide { display: none; }

    .category-rail {
      position: fixed;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 64px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      z-index: 20;
      touch-action: none;
    }
    .category-btn {
      background: rgba(255, 255, 255, 0.92);
      color: var(--accent);
      border: 1px solid #dcc9c0;
      border-radius: 8px;
      font-size: 12px;
      padding: 8px 4px;
      box-shadow: 0 4px 14px rgba(37, 50, 43, 0.08);
    }

    .bottom-bar {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 25;
      background: rgba(34, 37, 34, 0.94);
      padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
      display: flex;
      gap: 10px;
      box-shadow: 0 -10px 30px rgba(0, 0, 0, 0.18);
    }
    .bottom-bar button {
      flex: 1;
      background: #f6e6df;
      color: #69392f;
      border: 0;
      font-weight: 800;
    }

    .picked-panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 66px;
      max-height: 45vh;
      overflow: auto;
      background: var(--surface);
      border-top: 1px solid var(--line);
      padding: 14px;
      z-index: 24;
      box-shadow: 0 -10px 28px rgba(37, 50, 43, 0.12);
    }

    .admin-dish-actions { display: flex; gap: 8px; grid-column: 2; }
    .admin-dish-actions button { flex: 1; }
    .mode-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .mode-toggle label {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--ink);
      font-weight: 750;
    }
    .mode-toggle input { width: auto; }
    .celebration-note {
      border-color: rgba(201, 139, 133, 0.45);
      background: linear-gradient(135deg, #fff8f5, #f4e6df);
    }
    .celebration-card {
      position: relative;
      overflow: hidden;
      color: #f8eee9;
      background:
        linear-gradient(135deg, rgba(33, 24, 23, 0.88), rgba(94, 53, 45, 0.82)),
        linear-gradient(180deg, #4c312c, #211817);
      border-color: rgba(255, 226, 212, 0.26);
    }
    .celebration-card h2 { color: #ffe0d2; }
    .celebration-card .muted { color: #ead2c8; }
    .album-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 12px;
    }
    .album-tile {
      position: relative;
      min-height: 220px;
      border: 0;
      border-radius: 8px;
      overflow: hidden;
      padding: 0;
      background: var(--night);
      color: #fff;
      text-align: left;
      box-shadow: 0 14px 34px rgba(47, 31, 28, 0.18);
    }
    .album-tile img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
      filter: saturate(0.92) contrast(1.04);
    }
    .album-tile .album-caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 42px 12px 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0), rgba(25,16,15,0.88));
    }
    .album-tile strong { display: block; font-size: 16px; line-height: 1.25; }
    .album-tile span { display: block; margin-top: 4px; color: #f4d2c5; font-size: 12px; }
    .album-admin-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }
    .album-admin-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: var(--surface);
    }
    .album-admin-item img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .album-admin-body { padding: 10px; }
    .album-admin-actions { display: flex; gap: 8px; margin-top: 8px; }
    .album-admin-actions button { flex: 1; }
    .blessing-bar {
      margin-top: 10px;
      padding: 12px;
      border: 1px solid rgba(255, 224, 210, 0.38);
      border-radius: 8px;
      background: rgba(255, 244, 238, 0.12);
      color: #ffe4d8;
      line-height: 1.6;
    }
    .admin-collapse { margin-top: 16px; }
    .admin-collapse summary { cursor: pointer; color: var(--accent); font-weight: 800; }
    .modal-mask {
      position: fixed; inset: 0; background: rgba(18, 24, 20, 0.52);
      display: flex; align-items: center; justify-content: center; z-index: 40;
      padding: 14px;
    }
    .modal-mask.hide { display: none; }
    .modal {
      width: min(92vw, 520px);
      max-height: 92vh;
      overflow: auto;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
      box-shadow: 0 22px 70px rgba(0, 0, 0, 0.24);
    }
    .birthday-gift-mask,
    .birthday-mask {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 22px;
      color: var(--gift-cream);
    }
    .birthday-gift-mask {
      z-index: 74;
      background:
        radial-gradient(circle at 50% 52%, rgba(255, 201, 130, 0.22), transparent 28%),
        radial-gradient(circle at 30% 20%, rgba(188, 120, 109, 0.22), transparent 30%),
        radial-gradient(circle at 82% 74%, rgba(255, 217, 143, 0.15), transparent 30%),
        linear-gradient(145deg, var(--gift-velvet), #2d191a 54%, #120a0c);
      overflow: hidden;
    }
    .birthday-gift-mask.hide { display: none; }
    .gift-sparks,
    .gift-stage::before,
    .gift-stage::after {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .gift-sparks span {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--s);
      height: var(--s);
      border-radius: 50%;
      background: var(--c);
      opacity: 0.42;
      filter: blur(0.5px) drop-shadow(0 0 10px var(--c));
      animation: giftSparkFloat 3.8s ease-in-out infinite;
      animation-delay: var(--d);
    }
    .gift-stage {
      position: relative;
      width: min(560px, 86vw);
      height: min(560px, 70vh);
      min-height: 360px;
      display: grid;
      place-items: center;
      isolation: isolate;
    }
    .gift-stage::before {
      content: "";
      background:
        radial-gradient(ellipse at center, rgba(255, 214, 154, 0.2), transparent 36%),
        radial-gradient(ellipse at center, rgba(255, 241, 230, 0.08), transparent 58%);
      transform: scale(0.9);
      opacity: 0;
      animation: giftSpotlight 1.6s ease 0.55s forwards;
    }
    .gift-stage::after {
      content: "";
      width: min(72vw, 360px);
      height: min(72vw, 360px);
      margin: auto;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 217, 143, 0.08), transparent 68%);
      transform: scale(0.6);
      opacity: 0;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .birthday-gift-mask.is-ready .gift-stage::after,
    .birthday-gift-mask.is-opening .gift-stage::after {
      opacity: 1;
      transform: scale(1);
    }
    .gift-shadow {
      position: absolute;
      left: 50%;
      top: 66%;
      width: min(54vw, 280px);
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(0, 0, 0, 0.34), transparent 70%);
      transform: translateX(-50%) scale(0.42);
      opacity: 0;
      animation: giftShadowLand 1.85s cubic-bezier(.2,.88,.25,1) forwards;
      pointer-events: none;
    }
    .gift-box-shell {
      --pull: 0px;
      --ribbon-alpha: 1;
      --final-pull: 260px;
      position: relative;
      width: min(58vw, 286px);
      aspect-ratio: 1 / 0.82;
      border-radius: 16px;
      transform-origin: center;
      animation: giftDropIn 1.85s cubic-bezier(.18,.92,.22,1) forwards;
      z-index: 2;
    }
    .gift-box {
      position: absolute;
      inset: 18% 7% 5%;
      border-radius: 14px;
      overflow: visible;
      background:
        radial-gradient(circle at 18% 14%, rgba(255,255,255,0.42), transparent 23%),
        linear-gradient(90deg, rgba(255,255,255,0.28), transparent 24%, transparent 72%, rgba(111,54,49,0.08)),
        linear-gradient(135deg, #f9ddca, #d89b87 48%, #a85f58);
      border: 1px solid rgba(255, 238, 226, 0.54);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.48),
        inset 0 -24px 48px rgba(116, 55, 50, 0.28),
        0 24px 58px rgba(10, 5, 6, 0.42);
    }
    .gift-box::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 238, 218, 0.18), transparent 22%),
        radial-gradient(circle at 78% 90%, rgba(98, 44, 45, 0.28), transparent 30%);
      pointer-events: none;
    }
    .gift-lid {
      position: absolute;
      left: 3%;
      right: 3%;
      top: 3%;
      height: 31%;
      border-radius: 16px 16px 10px 10px;
      background:
        radial-gradient(circle at 16% 22%, rgba(255,255,255,0.44), transparent 28%),
        linear-gradient(90deg, rgba(255,255,255,0.26), transparent 26%, transparent 70%, rgba(111,54,49,0.08)),
        linear-gradient(135deg, #ffe6d4, #d99c88 50%, #ae655c);
      border: 1px solid rgba(255, 238, 226, 0.56);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.28),
        0 18px 28px rgba(20, 8, 9, 0.26);
      z-index: 4;
      transform-origin: 50% 95%;
      transition: transform 0.95s cubic-bezier(.18,.9,.18,1), opacity 0.75s ease, filter 0.75s ease;
    }
    .gift-ribbon {
      position: absolute;
      z-index: 6;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.28), transparent 18%, transparent 82%, rgba(255,255,255,0.18)),
        linear-gradient(135deg, #f2b49f, #b86b60 48%, #6c3430);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.34),
        0 9px 22px rgba(83, 34, 34, 0.3);
    }
    .gift-ribbon-vertical {
      top: 2%;
      bottom: 5%;
      left: 50%;
      width: 17%;
      border-radius: 10px;
      transform: translateX(-50%);
    }
    .gift-ribbon-horizontal {
      left: 7%;
      right: 7%;
      top: 45%;
      height: 19%;
      border-radius: 999px;
      cursor: grab;
      transform: translateX(var(--pull));
      opacity: var(--ribbon-alpha);
      transition: transform 0.35s cubic-bezier(.2,.85,.22,1), opacity 0.25s ease;
      touch-action: none;
    }
    .gift-ribbon-horizontal::before,
    .gift-ribbon-horizontal::after {
      content: "";
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
    }
    .gift-ribbon-horizontal::before {
      left: 50%;
      width: 56px;
      height: 38px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 38% 34%, rgba(255,255,255,0.34), transparent 28%),
        linear-gradient(135deg, #f5baa6, #b8675d 54%, #743832);
      border: 1px solid rgba(255, 226, 213, 0.56);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.32),
        0 9px 18px rgba(48, 19, 20, 0.24);
    }
    .gift-ribbon-horizontal::after {
      left: 50%;
      width: 92px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255, 237, 224, 0.6), transparent);
    }
    .gift-pull {
      position: absolute;
      right: -9%;
      top: 48%;
      z-index: 8;
      width: 58px;
      height: 58px;
      min-height: 58px;
      padding: 0;
      border: 1px solid rgba(255, 241, 220, 0.62);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #fff7df, var(--gift-gold) 44%, #c77e5f 100%);
      box-shadow:
        0 0 0 0 rgba(255, 217, 143, 0.46),
        0 0 28px rgba(255, 217, 143, 0.42),
        0 14px 28px rgba(33, 11, 13, 0.28);
      transform: translate(42%, -50%) translateX(var(--pull));
      opacity: var(--ribbon-alpha);
      transition: transform 0.35s cubic-bezier(.2,.85,.22,1), opacity 0.25s ease, box-shadow 0.3s ease;
      touch-action: none;
    }
    .gift-pull::before {
      content: "";
      position: absolute;
      inset: 18px 16px 18px 19px;
      border-top: 3px solid rgba(84, 38, 33, 0.76);
      border-right: 3px solid rgba(84, 38, 33, 0.76);
      transform: rotate(45deg);
    }
    .gift-trail {
      position: absolute;
      left: calc(50% + 68px);
      top: 48%;
      width: 118px;
      height: 2px;
      z-index: 7;
      background: linear-gradient(90deg, rgba(255, 217, 143, 0), rgba(255, 217, 143, 0.74), rgba(255, 217, 143, 0));
      opacity: 0;
      transform: translateY(-50%) scaleX(0.3);
      transform-origin: left;
      pointer-events: none;
    }
    .gift-inside-light,
    .gift-glow {
      position: absolute;
      inset: 20% 18% 8%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 236, 179, 0.98), rgba(255, 193, 108, 0.34) 44%, transparent 70%);
      opacity: 0;
      filter: blur(2px);
      transform: scale(0.54);
      transition: opacity 0.7s ease, transform 0.9s ease;
      pointer-events: none;
      z-index: 3;
    }
    .gift-inside-light {
      inset: 20% 4% -24%;
      z-index: 1;
      filter: blur(13px);
    }
    .birthday-gift-mask.is-ready .gift-pull {
      animation: giftHandlePulse 1.35s ease-in-out infinite;
    }
    .birthday-gift-mask.is-ready .gift-trail {
      opacity: 0.9;
      animation: giftGuideSweep 1.6s ease-in-out infinite;
    }
    .birthday-gift-mask.is-dragging .gift-ribbon-horizontal,
    .birthday-gift-mask.is-dragging .gift-pull {
      cursor: grabbing;
      transition: none;
    }
    .birthday-gift-mask.is-resetting .gift-ribbon-horizontal,
    .birthday-gift-mask.is-resetting .gift-pull {
      transition: transform 0.36s cubic-bezier(.2,.85,.22,1), opacity 0.25s ease;
    }
    .birthday-gift-mask.is-opening .gift-ribbon-horizontal,
    .birthday-gift-mask.is-opening .gift-pull {
      opacity: 0;
      transform: translateX(var(--final-pull));
      transition: transform 0.72s cubic-bezier(.18,.88,.2,1), opacity 0.38s ease;
    }
    .birthday-gift-mask.is-opening .gift-pull {
      transform: translate(42%, -50%) translateX(var(--final-pull));
    }
    .birthday-gift-mask.is-opening .gift-lid {
      transform: translateY(-76px) scale(0.84) rotate(-5deg);
      opacity: 0.32;
      filter: blur(1px);
    }
    .birthday-gift-mask.is-opening .gift-glow,
    .birthday-gift-mask.is-opening .gift-inside-light {
      opacity: 1;
      transform: scale(1.24);
    }
    .birthday-gift-mask.is-opening .gift-box-shell {
      animation: giftOpenLift 1s ease forwards;
    }
    .birthday-mask {
      z-index: 70;
      background:
        radial-gradient(circle at 50% 52%, rgba(255, 217, 143, 0.2), transparent 30%),
        radial-gradient(circle at 30% 20%, rgba(188, 120, 109, 0.24), transparent 32%),
        radial-gradient(circle at 80% 78%, rgba(255, 191, 168, 0.2), transparent 34%),
        linear-gradient(135deg, var(--gift-velvet), var(--gift-velvet-2) 55%, #160d0f);
      animation: birthdayFade 5.2s ease forwards;
      overflow: hidden;
    }
    .birthday-mask.hide { display: none; }
    .fireworks {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .fireworks span {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--c);
      box-shadow:
        0 -38px 0 var(--c),
        27px -27px 0 var(--c),
        38px 0 0 var(--c),
        27px 27px 0 var(--c),
        0 38px 0 var(--c),
        -27px 27px 0 var(--c),
        -38px 0 0 var(--c),
        -27px -27px 0 var(--c);
      opacity: 0;
      animation: fireworkBurst 1.55s ease-out infinite;
      animation-delay: var(--d);
      filter: drop-shadow(0 0 10px var(--c));
    }
    .birthday-scene {
      position: relative;
      width: min(720px, 92vw);
      text-align: center;
      padding: clamp(30px, 7vw, 58px) clamp(22px, 6vw, 48px);
      border: 1px solid rgba(255, 230, 218, 0.2);
      border-radius: 16px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255, 217, 143, 0.18), transparent 42%),
        rgba(31, 20, 19, 0.38);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 30px 90px rgba(0, 0, 0, 0.38);
      backdrop-filter: blur(8px);
      animation: birthdayRise 1.1s ease both;
      overflow: hidden;
    }
    .birthday-scene::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -140px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 217, 143, 0.32), transparent 68%);
      transform: translateX(-50%);
      pointer-events: none;
    }
    .birthday-scene h2 {
      position: relative;
      margin: 0 0 12px;
      color: #fff0dc;
      font-size: clamp(28px, 8vw, 58px);
      letter-spacing: 0;
      text-shadow: 0 0 28px rgba(255, 217, 143, 0.3);
    }
    .birthday-scene p {
      position: relative;
      margin: 0 auto;
      max-width: 560px;
      line-height: 1.8;
      color: #f9d8cc;
      font-size: clamp(15px, 2.6vw, 18px);
    }

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadString, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js";

    const categories = ["肉类", "海鲜", "蔬菜", "主食", "点心"];
    const params = new URLSearchParams(location.search);
    const DEFAULT_ADMIN_SECRET = "icarus.cooker";
    const LEGACY_ADMIN_SECRET = "chef-admin";
    const DEFAULT_BIRTHDAY_MESSAGE = "今天这份点菜软件，也是一张小小菜单：把想做给你的饭、想陪你过的日子，都慢慢收进来。生日快乐，熙熙。";
    const MAX_IMAGE_BYTES = 105 * 1024;
    const FIRESTORE_WARN_PAYLOAD_BYTES = 980 * 1024;
    const DISH_IMAGE_STORAGE_FOLDER = "menu_rooms/main/dishes";
    const ALBUM_IMAGE_STORAGE_FOLDER = "menu_rooms/main/album";
    const CELEBRATION_MODE = "celebration";
    const NORMAL_MODE = "normal";
    const adminModeRequested = params.get("admin") === "1";
    const celebrationPageRequested = params.get("celebrate") === "1";
    const adminKeyFromUrl = params.get("key") || "";
    let isAdmin = false;
    let isCelebrationPage = false;

    function makeId() { return `id-${Date.now()}-${Math.floor(Math.random() * 1e9)}`; }
    function buildDishImage(name) {
      const safe = String(name || "").replace(/[<>&'\"]/g, "");
      const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#f8efe1"/><stop offset="100%" stop-color="#e8d7bf"/></linearGradient></defs><rect width="100%" height="100%" fill="url(#g)"/><text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-size="72" fill="#7c623d" font-family="serif">${safe}</text></svg>`;
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function protectImage(img, label) {
      if (!img) return;
      img.onerror = () => {
        img.onerror = null;
        img.src = buildDishImage(label || "料理");
      };
    }

    const seed = [

      return isAdmin || isCelebrationPage;
    }

          albumPanel.classList.remove("hide");

          celebrationPanel.classList.add("hide");
          albumPanel.classList.add("hide");
        }
      }
    }

    function getStore(key, fallback = "") {
      try { return localStorage.getItem(key) || fallback; } catch { return fallback; }
    }
    function setStore(key, value) {
      try { localStorage.setItem(key, value); } catch {}
    }

    function byteLength(value) {
      return new TextEncoder().encode(String(value || "")).length;
    }

    function formatBytes(bytes) {
      if (bytes < 1024) return `${bytes}B`;
      return `${Math.round(bytes / 1024)}KB`;
    }

    function dataUrlBytes(dataUrl) {
      const match = String(dataUrl || "").match(/^data:[^,]+,([\s\S]*)$/);
      if (!match) return byteLength(dataUrl);
      const base64 = match[1];
      const padding = base64.endsWith("==") ? 2 : base64.endsWith("=") ? 1 : 0;
      return Math.max(0, Math.floor((base64.length * 3) / 4) - padding);
    }

    function statePayloadBytes(state) {
      return byteLength(JSON.stringify({ state }));
    }

    function pushFailureText() {
      return lastPushError || "请检查网络、实时连接状态，或换一张更小的图片后重试";
    }

    function dishImagePath(dishId) {
      return `${DISH_IMAGE_STORAGE_FOLDER}/${dishId}.jpg`;
    }

    function albumImagePath(albumId) {
      return `${ALBUM_IMAGE_STORAGE_FOLDER}/${albumId}.jpg`;
    }

    function isDataUrl(value) {
      return String(value || "").startsWith("data:");
    }

    async function uploadDishImage(dishId, dataUrl) {
      if (!dataUrl) return "";
      if (!isDataUrl(dataUrl)) return dataUrl;
      if (!storage) return dataUrl;
      const imgRef = storageRef(storage, dishImagePath(dishId));
      await uploadString(imgRef, dataUrl, "data_url", {
        contentType: "image/jpeg",
        customMetadata: { source: "order-gizmo", compressed: "true" }
      });
      const url = await getDownloadURL(imgRef);
      return `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;
    }

    async function uploadAlbumImage(albumId, dataUrl) {
      if (!dataUrl) return "";
      if (!isDataUrl(dataUrl)) return dataUrl;
      if (!storage) return dataUrl;
      const imgRef = storageRef(storage, albumImagePath(albumId));
      await uploadString(imgRef, dataUrl, "data_url", {
        contentType: "image/jpeg",
        customMetadata: { source: "order-gizmo-album", compressed: "true" }
      });
      const url = await getDownloadURL(imgRef);
      return `${url}${url.includes("?") ? "&" : "?"}v=${Date.now()}`;

    function resetGiftBox(giftBoxShell) {
      if (!giftBoxShell) return;
      giftBoxShell.style.setProperty("--pull", "0px");
      giftBoxShell.style.setProperty("--ribbon-alpha", "1");
      giftBoxShell.style.setProperty("--final-pull", "260px");
    }

    function startBirthdayGiftMoment(onDone) {
      const giftMask = document.getElementById("birthdayGiftMask");
      const giftBoxShell = document.getElementById("giftBoxShell");
      if (!giftMask || !giftBoxShell) {
        onDone();
        return;
      }

      const prefersReduced = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      let ready = false;
      let completed = false;
      let dragging = false;
      let startX = 0;
      let currentPull = 0;
      let maxPull = 260;
      let threshold = 170;
      let readyTimer = 0;
      let openTimer = 0;

      function refreshPullLimits() {
        const width = giftBoxShell.getBoundingClientRect().width || 286;
        maxPull = Math.round(width * 0.82);
        threshold = Math.round(width * 0.58);
        giftBoxShell.style.setProperty("--final-pull", `${maxPull}px`);
      }

      function setPull(value) {
        refreshPullLimits();
        currentPull = Math.max(0, Math.min(maxPull, value));
        const progress = currentPull / maxPull;
        giftBoxShell.style.setProperty("--pull", `${currentPull}px`);
        giftBoxShell.style.setProperty("--ribbon-alpha", `${Math.max(0.14, 1 - progress * 0.86).toFixed(2)}`);
      }

      function cleanup() {
        window.clearTimeout(readyTimer);
        window.clearTimeout(openTimer);
        giftBoxShell.removeEventListener("pointerdown", onPointerDown);
        giftBoxShell.removeEventListener("pointermove", onPointerMove);
        giftBoxShell.removeEventListener("pointerup", onPointerEnd);
        giftBoxShell.removeEventListener("pointercancel", onPointerEnd);
        giftMask.removeEventListener("keydown", onKeyDown);
        document.body.classList.remove("birthday-gift-active");
      }

      function finish() {
        cleanup();
        giftMask.classList.add("hide");
        giftMask.classList.remove("is-ready", "is-dragging", "is-resetting", "is-opening");
        giftMask.setAttribute("aria-hidden", "true");
        resetGiftBox(giftBoxShell);
        onDone();
      }

      function completeGiftOpen() {
        if (completed) return;
        completed = true;
        ready = false;
        dragging = false;
        refreshPullLimits();
        giftMask.classList.remove("is-ready", "is-dragging", "is-resetting");
        giftMask.classList.add("is-opening");
        giftBoxShell.style.setProperty("--pull", `${maxPull}px`);
        giftBoxShell.style.setProperty("--ribbon-alpha", "0");
        openTimer = window.setTimeout(finish, prefersReduced ? 620 : 1250);
      }

      function resetDrag() {
        giftMask.classList.remove("is-dragging");
        giftMask.classList.add("is-resetting");
        setPull(0);
        window.setTimeout(() => giftMask.classList.remove("is-resetting"), 380);
      }

      function onPointerDown(e) {
        if (!ready || completed) return;
        if (!e.target.closest(".gift-box, .gift-ribbon-horizontal, .gift-pull")) return;
        e.preventDefault();
        dragging = true;
        giftMask.classList.add("is-dragging");
        startX = e.clientX - currentPull;
        if (giftBoxShell.setPointerCapture) giftBoxShell.setPointerCapture(e.pointerId);
      }

      function onPointerMove(e) {
        if (!dragging || completed) return;
        e.preventDefault();
        setPull(e.clientX - startX);
        if (currentPull >= threshold) completeGiftOpen();
      }

      function onPointerEnd(e) {
        if (!dragging || completed) return;
        dragging = false;
        if (giftBoxShell.releasePointerCapture) {
          try { giftBoxShell.releasePointerCapture(e.pointerId); } catch {}
        }
        if (currentPull >= threshold) {
          completeGiftOpen();
        } else {
          resetDrag();
        }
      }

      function onKeyDown(e) {
        if (!ready || completed) return;
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          completeGiftOpen();
        }
      }

      giftMask.classList.add("hide");
      giftMask.classList.remove("is-ready", "is-dragging", "is-resetting", "is-opening");
      resetGiftBox(giftBoxShell);
      void giftMask.offsetHeight;
      giftMask.classList.remove("hide");
      giftMask.setAttribute("aria-hidden", "false");
      document.body.classList.add("birthday-gift-active");
      giftBoxShell.style.animation = "none";
      void giftBoxShell.offsetHeight;
      giftBoxShell.style.animation = "";

      giftBoxShell.addEventListener("pointerdown", onPointerDown);
      giftBoxShell.addEventListener("pointermove", onPointerMove);
      giftBoxShell.addEventListener("pointerup", onPointerEnd);
      giftBoxShell.addEventListener("pointercancel", onPointerEnd);
      giftMask.addEventListener("keydown", onKeyDown);

      readyTimer = window.setTimeout(() => {
        if (completed) return;
        ready = true;
        refreshPullLimits();
        giftMask.classList.add("is-ready");
        giftMask.focus({ preventScroll: true });
      }, prefersReduced ? 320 : 1850);
    }

    async function connectFirebase() {
      if (roomRef) {
        connectStatus.textContent = "已连接 Firebase 实时同步";
        return;
      }
      const apiKey = document.getElementById("fbApiKey").value.trim();
      const authDomain = document.getElementById("fbAuthDomain").value.trim();
      const projectId = document.getElementById("fbProjectId").value.trim();
      const storageBucket = document.getElementById("fbStorageBucket").value.trim() || `${projectId}.firebasestorage.app`;
      const appId = document.getElementById("fbAppId").value.trim();
      if (!apiKey || !authDomain || !projectId || !storageBucket || !appId) return alert("请填写完整 Firebase 参数");

      setStore("fb-apiKey", apiKey);
      setStore("fb-authDomain", authDomain);
      setStore("fb-projectId", projectId);
      setStore("fb-storageBucket", storageBucket);
      setStore("fb-appId", appId);

      connectStatus.textContent = "连接中...";
      const app = initializeApp({ apiKey, authDomain, projectId, storageBucket, appId }, `app-${projectId}`);
      const db = getFirestore(app);
      storage = getStorage(app);
      roomRef = doc(db, "menu_rooms", "main");

      const snap = await getDoc(roomRef);
      if (!snap.exists()) {
        await setDoc(roomRef, { state: roomState, updatedAt: serverTimestamp() });
      } else {
        roomState = safeState(snap.data().state);
      }
      syncAdminAccess();
      await migrateInlineImages();

      onSnapshot(roomRef, (s) => {
        if (!s.exists()) return;
        roomState = safeState(s.data().state);
        syncAdminAccess();
        syncSettingsControls();
        render();
      });

      syncTag.textContent = "实时中";
      connectStatus.textContent = "已连接 Firebase 实时同步，图片将保存到 Storage 文件夹";
      syncSettingsControls();
      render();
    }

    async function pushState() {
      lastPushError = "";
      if (!roomRef) return false;
      const inline = inlineImageStats();
      if (!inlineMigrationInProgress && storage && (inline.dishes.length || inline.album.length)) {
        inlineMigrationInProgress = true;
        const migrated = await migrateInlineImages({ save: false });
        inlineMigrationInProgress = false;
        if (migrated === false) return false;
      }
      const payloadBytes = statePayloadBytes(roomState);
      if (payloadBytes > FIRESTORE_WARN_PAYLOAD_BYTES) {
        console.warn(`保存内容约 ${formatBytes(payloadBytes)}，已接近 Firestore 单文档上限，仍将尝试写入`);
      }
      try {
        await setDoc(roomRef, { state: roomState, updatedAt: serverTimestamp() }, { merge: true });
        return true;
      } catch (e) {
        console.error(e);
        lastPushError = e && e.message ? e.message : "写入云端失败";
        return false;
      }
    }

    function renderSummary() {
      const box = document.getElementById("summary");
      if (!isAdmin) { box.textContent = "仅管理员可看明细与统计。"; return; }
      const dishes = roomState.dishes || [];
      const count = {};
      const noteMap = {};
      let html = "<div>";
      Object.entries(roomState.orders || {}).forEach(([name, data]) => {
        const picks = Object.entries(data.picks || {}).filter(([, v]) => v);
        const items = picks.map(([id]) => {
          const dish = dishes.find((d) => d.id === id);
          if (!dish) return null;
          const tempNote = (data.notes && data.notes[id]) || "";
          if (tempNote) {
            if (!noteMap[id]) noteMap[id] = [];
            noteMap[id].push(`${name}:${tempNote}`);
          }
          return `${dish.name}${tempNote ? `（${tempNote}）` : ""}`;
        }).filter(Boolean);
        const status = data.submittedAt ? "<span class='pill'>已提交</span>" : "<span class='pill'>未提交</span>";
        html += `<div><strong>${name}</strong> ${status}：${items.join("、") || "未点"}</div>`;
        picks.forEach(([id]) => { count[id] = (count[id] || 0) + 1; });
      });
      html += "<hr><strong>总计：</strong><br/>";
      Object.entries(count).forEach(([id, n]) => {
        const d = dishes.find((x) => x.id === id);
        if (d) html += `${d.name} x ${n}${noteMap[id] && noteMap[id].length ? `<br/><span class='muted'>备注：${noteMap[id].join("；")}</span>` : ""}<br/>`;
      });
      html += "</div>";
      box.innerHTML = html;
    }

    function buildSummaryHtml() {
      function shortenNote(text) {
        const raw = String(text || "").trim();
        if (!raw) return "";
        if (/\s/.test(raw)) {
          const words = raw.split(/\s+/);
          return words.length > 20 ? `${words.slice(0, 20).join(" ")} 略` : raw;
        }
        return raw.length > 20 ? `${raw.slice(0, 20)}略` : raw;
      }
      const dishes = roomState.dishes || [];
      const count = {};
      const noteMap = {};
      Object.entries(roomState.orders || {}).forEach(([name, data]) => {
        Object.entries(data.picks || {}).forEach(([id, v]) => {
          if (!v) return;
          count[id] = (count[id] || 0) + 1;
          const t = (data.notes && data.notes[id]) || "";
          if (t) {
            if (!noteMap[id]) noteMap[id] = [];
            noteMap[id].push(`${name}:${shortenNote(t)}`);
          }
        });
      });
      let rows = "";
      Object.entries(count).forEach(([id, n]) => {
        const d = dishes.find((x) => x.id === id);
        if (!d) return;
        rows += `<tr><td>${d.name}</td><td>${d.cat}</td><td>${n}</td><td>${shortenNote(d.note || "")}</td><td>${(noteMap[id] || []).join("；")}</td></tr>`;
      });
      return `<!doctype html><html><head><meta charset="UTF-8"><title>点菜单汇总</title><style>body{font-family:serif;background:#f7f2e8;color:#2b2118;padding:24px}h1{color:#8b6a3e;margin-bottom:12px}table{width:100%;border-collapse:collapse;background:#fffdf8}th,td{border:1px solid #dcc8ab;padding:10px;text-align:left}th{background:#f0e1ca}tr:nth-child(even){background:#fcf7ef}</style></head><body><h1>聚会点菜单汇总</h1><table><tr><th>菜名</th><th>分类</th><th>数量</th><th>菜品备注</th><th>用户备注</th></tr>${rows}</table></body></html>`;
    }

      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function compressImageToDataURL(file, maxSide = 900, quality = 0.76, maxImageBytes = MAX_IMAGE_BYTES) {
      const raw = await fileToDataURL(file);
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => {
          const c = document.createElement("canvas");
          const ctx = c.getContext("2d");
          let side = maxSide;
          let q = quality;
          let best = "";

          for (let i = 0; i < 8; i += 1) {
            const ratio = Math.min(1, side / Math.max(img.width, img.height));
            const w = Math.max(1, Math.round(img.width * ratio));
            const h = Math.max(1, Math.round(img.height * ratio));
            c.width = w;
            c.height = h;
            ctx.drawImage(img, 0, 0, w, h);
            best = c.toDataURL("image/jpeg", q);
            if (dataUrlBytes(best) <= maxImageBytes) {
              resolve(best);
              return;
            }
            side = Math.max(360, Math.round(side * 0.78));
            q = Math.max(0.48, q - 0.08);
          }

          reject(new Error(`图片压缩后仍有 ${formatBytes(dataUrlBytes(best))}，请换一张更小的图片`));
        };
        img.onerror = () => {
          if (dataUrlBytes(raw) <= maxImageBytes) {
            resolve(raw);
          } else {
            reject(new Error("图片格式无法压缩，请换一张更小的图片"));
          }
        };
        img.src = raw;
      });
    }
